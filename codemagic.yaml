workflows:
  ios-capacitor-build:
    name: iOS Modern Capacitor Build
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: 1. Node Paketlerini Kur
        script: npm install
      - name: 2. Web Kodlarini Derle
        script: npm run build
      - name: 3. iOS Klasorunu Senkronize Et
        script: npx cap sync ios
      - name: 4. Swift Paketlerini Zorla Cozumle (SPM)
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: 5. iOS Uygulamasını Arşivle
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive
      - name: 6. Cikti Dosyasini İndirme Klasorune Kopyala
        script: |
          mkdir -p build-output
          cp -R ios/App/build/App.xcarchive/Products/Applications/App.app build-output/
    artifacts:
      - build-output/*.app

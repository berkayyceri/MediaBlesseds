workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web project
        script: npm run build
      - name: Capacitor Sync iOS
        script: npx cap sync ios
      - name: Build iOS App
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
    artifacts:
      - ios/App/build/Release-iphoneos/*.app
